name: Distribute vauban

on:
  push:
    branches: [main]

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vauban
        uses: actions/checkout@v4
        with:
          path: vauban

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install pre-commit detect-secrets

      - name: Configure git
        run: |
          git config --global user.name "vauban-bot"
          git config --global user.email "vauban-bot@users.noreply.github.com"

      - name: Distribute to all repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          distribute() {
            local repo=$1
            local ecosystem=$2
            echo "=== distributing to $repo ($ecosystem) ==="
            git clone "https://x-access-token:${GH_PAT}@github.com/mediiiiium/${repo}.git" "targets/${repo}"
            bash vauban/setup.sh "targets/${repo}" "$ecosystem"
            cd "targets/${repo}"
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "chore: update vauban security setup"
              git push "https://x-access-token:${GH_PAT}@github.com/mediiiiium/${repo}.git" HEAD
              echo "✓ $repo updated"
            else
              echo "- $repo no changes"
            fi
            cd ../..
          }

          distribute now-on-tap npm
          distribute podcast    pip
          distribute sora       pip
          distribute mcp-jp     none
          distribute brewdrop   none
